services:
  authentik-provisioner:
    image: ${POSTGRES_IMAGE}:${POSTGRES_IMAGE_TAG}
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_SUPER_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_SUPER_USER: ${POSTGRES_SUPER_USER}
      POSTGRES_SUPER_PASSWORD: ${POSTGRES_SUPER_PASSWORD}
      POSTGRES_AUTHENTIK_USER: ${POSTGRES_AUTHENTIK_USER}
      POSTGRES_AUTHENTIK_PASSWORD: ${POSTGRES_AUTHENTIK_PASSWORD}
      POSTGRES_AUTHENTIK_DB: ${POSTGRES_AUTHENTIK_DB}
    command: sh /provision.sh
    volumes:
      - ./provision.sh:/provision.sh:ro
    networks:
      - data-net

  server:
    image: ${AUTHENTIK_IMAGE}:${AUTHENTIK_TAG}
    command: server
    restart: unless-stopped
    depends_on:
      authentik-provisioner:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "ak healthcheck"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${HEALTHCHECK_START_PERIOD}
    deploy:
      resources:
        limits:
          memory: ${AUTHENTIK_SERVER_MEMORY_LIMIT}
          cpus: ${AUTHENTIK_SERVER_CPU_LIMIT}
        reservations:
          memory: ${AUTHENTIK_SERVER_MEMORY_RESERVATION}
          cpus: ${AUTHENTIK_SERVER_CPU_RESERVATION}
    environment:
      AUTHENTIK_REDIS__HOST: ${REDIS_HOST}
      AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD}
      AUTHENTIK_POSTGRESQL__HOST: ${POSTGRES_HOST}
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_AUTHENTIK_USER}
      AUTHENTIK_POSTGRESQL__NAME: ${POSTGRES_AUTHENTIK_DB}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_AUTHENTIK_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_HOST: ${AUTHENTIK_HOST}
      AUTHENTIK_EMAIL__HOST: ${SMTP_HOST}
      AUTHENTIK_EMAIL__PORT: ${SMTP_PORT}
      AUTHENTIK_EMAIL__USERNAME: ${SMTP_USERNAME}
      AUTHENTIK_EMAIL__PASSWORD: ${SMTP_PASSWORD}
      AUTHENTIK_EMAIL__USE_TLS: ${SMTP_USE_TLS}
      AUTHENTIK_EMAIL__USE_SSL: ${SMTP_USE_SSL}
      AUTHENTIK_EMAIL__TIMEOUT: ${SMTP_TIMEOUT}
      AUTHENTIK_EMAIL__FROM: ${SMTP_FROM}
    volumes:
      - ./media:/data/media
      - ./templates:/templates
    networks:
      - internal-net
      - data-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`${AUTHENTIK_DOMAIN}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.services.authentik.loadbalancer.server.port=${AUTHENTIK_PORT}"
      - "traefik.docker.network=${NETWORK_INTERNAL}"

  worker:
    image: ${AUTHENTIK_IMAGE}:${AUTHENTIK_TAG}
    command: worker
    restart: unless-stopped
    user: root
    depends_on:
      authentik-provisioner:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "ak healthcheck"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${HEALTHCHECK_START_PERIOD}
    deploy:
      resources:
        limits:
          memory: ${AUTHENTIK_WORKER_MEMORY_LIMIT}
          cpus: ${AUTHENTIK_WORKER_CPU_LIMIT}
        reservations:
          memory: ${AUTHENTIK_WORKER_MEMORY_RESERVATION}
          cpus: ${AUTHENTIK_WORKER_CPU_RESERVATION}
    environment:
      AUTHENTIK_REDIS__HOST: ${REDIS_HOST}
      AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD}
      AUTHENTIK_POSTGRESQL__HOST: ${POSTGRES_HOST}
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_AUTHENTIK_USER}
      AUTHENTIK_POSTGRESQL__NAME: ${POSTGRES_AUTHENTIK_DB}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_AUTHENTIK_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_EMAIL__HOST: ${SMTP_HOST}
      AUTHENTIK_EMAIL__PORT: ${SMTP_PORT}
      AUTHENTIK_EMAIL__USERNAME: ${SMTP_USERNAME}
      AUTHENTIK_EMAIL__PASSWORD: ${SMTP_PASSWORD}
      AUTHENTIK_EMAIL__USE_TLS: ${SMTP_USE_TLS}
      AUTHENTIK_EMAIL__USE_SSL: ${SMTP_USE_SSL}
      AUTHENTIK_EMAIL__TIMEOUT: ${SMTP_TIMEOUT}
      AUTHENTIK_EMAIL__FROM: ${SMTP_FROM}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./media:/data/media
      - ./certs:/certs
      - ./templates:/templates
      - ./blueprints:/blueprints/custom
    networks:
      - internal-net
      - data-net

networks:
  internal-net:
    name: ${NETWORK_INTERNAL}
    external: true
  data-net:
    name: ${NETWORK_DATA}
    external: true